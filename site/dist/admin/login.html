<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — indusmapk 後台</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --error: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 1.5rem;
    font-weight: 600;
  }
  p.lead {
    margin: 0 0 2rem;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }
button.google {
    width: 100%;
    padding: 0.85rem 1rem;
    background: white;
    color: #1f2937;
    border: 0;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    transition: opacity 0.15s, transform 0.05s;
  }
  button.google:hover { opacity: 0.92; }
  button.google:active { transform: scale(0.98); }
  button.google:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button.google svg { width: 20px; height: 20px; }
  .error {
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--error);
    border-radius: 6px;
    color: var(--error);
    font-size: 0.875rem;
  }
  .footer-note {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div class="card">
    <h1>登入 indusmapk</h1>
    <p class="lead">用 Google 帳號一鍵註冊登入。首次登入會自動建立會員帳號。</p>

    <div id="error-box" class="error" style="display:none"></div>

    <div
      id="cf-turnstile"
      class="cf-turnstile"
      data-sitekey="0x4AAAAAADHw9r3wqz3KVByo"
      data-size="invisible"
      data-theme="dark"
    ></div>

    <button class="google" id="login-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M12 5c1.6 0 3.1.6 4.2 1.6l3.1-3.1C17.4 1.7 14.9 0 12 0 7.4 0 3.4 2.6 1.4 6.5l3.6 2.8C6 6.6 8.8 5 12 5z"/>
        <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.7-.2-2.3H12v4.5h6.5c-.3 1.5-1.1 2.7-2.3 3.5l3.5 2.7c2.1-1.9 3.3-4.8 3.3-8.4z"/>
        <path fill="#FBBC05" d="M5 14.3c-.3-.7-.5-1.5-.5-2.3s.2-1.6.5-2.3L1.4 6.5C.5 8.2 0 10 0 12s.5 3.8 1.4 5.5l3.6-2.8z"/>
        <path fill="#34A853" d="M12 24c3 0 5.6-1 7.5-2.7l-3.5-2.7c-1 .7-2.3 1.1-4 1.1-3.2 0-5.9-2-6.9-4.8l-3.6 2.8C2.9 21 6.9 24 12 24z"/>
      </svg>
      用 Google 登入
    </button>

    <div class="footer-note">
      返回 <a href="/">首頁</a>
    </div>
  </div>

<script>
  const errorBox = document.getElementById('error-box');
  const loginBtn = document.getElementById('login-btn');
  const googleBtnInner = loginBtn.innerHTML;

  // 顯示 query string error（從 callback 跳回來）
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    const msg = ({
      'state-mismatch': '安全驗證失敗，請重新登入。',
      'state-missing': '登入逾時，請重新嘗試。',
      'token-exchange-400': 'Google 授權失敗，請重新嘗試。',
      'no-email': 'Google 帳號沒有 email，無法登入。',
      'suspended': '此帳號已停權，請聯絡管理員。',
      'turnstile-failed': '安全驗證失敗，請重新整理頁面。',
    })[err] || `登入失敗：${err}`;
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  loginBtn.addEventListener('click', () => {
    loginBtn.disabled = true;
    loginBtn.textContent = '驗證中...';
    const next = params.get('next') || '/';
    turnstile.execute('#cf-turnstile', {
      callback(token) {
        location.href = `/api/auth/login?ts=${encodeURIComponent(token)}&next=${encodeURIComponent(next)}`;
      },
      'error-callback'() {
        loginBtn.disabled = false;
        loginBtn.innerHTML = googleBtnInner;
        errorBox.textContent = '驗證機器人保護失敗，請重新整理頁面。';
        errorBox.style.display = 'block';
      },
    });
  });
</script>
</body>
</html>
