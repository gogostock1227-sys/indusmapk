<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需要升級權限 — indusmapk</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --gold: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lock {
    font-size: 3rem;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3));
  }
  h1 {
    margin: 0 0 0.75rem;
    font-size: 1.5rem;
    font-weight: 600;
  }
  p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0.5rem 0;
  }
  .from-path {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.5rem 1rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    border-radius: 6px;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--gold);
  }
  .role-info {
    margin: 1.5rem 0;
    padding: 1rem;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .role-info strong { color: var(--gold); }
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .actions a, .actions button {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    border: 0;
    text-align: center;
    transition: opacity 0.15s;
  }
  .actions a:hover, .actions button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border) !important; }
  .role-name {
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>此內容需要升級權限</h1>
    <p>你嘗試訪問的頁面：</p>
    <div class="from-path" id="from-path">—</div>

    <div class="role-info" id="role-info" style="display:none">
      <p style="margin-top:0">你目前的角色：<strong class="role-name" id="current-role">—</strong></p>
      <p style="margin-bottom:0">需要的角色：<strong class="role-name" id="need-role">—</strong></p>
    </div>

    <div id="guest-msg" style="display:none">
      <p>請先用 Google 登入，並聯絡管理員協助升級權限。</p>
    </div>

    <div id="member-msg" style="display:none">
      <p>你已經登入。請聯絡管理員協助升級為進階用戶。</p>
    </div>

    <div class="actions">
      <a href="/" class="btn-secondary">回首頁</a>
      <a href="/admin/login.html" id="login-btn" class="btn-primary">用 Google 登入</a>
    </div>
  </div>

<script>
  // 路徑 → 中文名稱反查（與 admin/access-rules.html 的 PAGE_PRESETS 對齊）
  const PAGE_LABELS = {
    "/heatmap.html":       "熱力圖",
    "/database.html":      "個股資料庫",
    "/compare.html":       "個股比較",
    "/ai.html":            "AI 助手",
    "/stock-futures.html": "股期儀表板",
    "/rs.html":            "RS 評分",
    "/rankings.html":      "排行榜",
    "/today.html":         "今日盤勢",
    "/memo.html":          "備忘錄",
    "/index.html":         "首頁",
    "/":                   "首頁",
  };
  const ROLE_LABELS = {
    guest:       "訪客",
    member:      "免費會員",
    premium:     "進階用戶",
    admin:       "管理員",
    super_admin: "超級管理員",
  };

  function pathLabel(path) {
    if (!path) return "（未知頁面）";
    // 雙向歸一化：CF Pages 同一頁有 /foo 跟 /foo.html 兩種 URL 變體
    // 用兩個查 key 都試一次，避免 map 重複定義
    const withHtml    = path.endsWith(".html") ? path           : path + ".html";
    const withoutHtml = path.endsWith(".html") ? path.slice(0, -5) : path;
    if (PAGE_LABELS[path])        return PAGE_LABELS[path];
    if (PAGE_LABELS[withHtml])    return PAGE_LABELS[withHtml];
    if (PAGE_LABELS[withoutHtml]) return PAGE_LABELS[withoutHtml];
    let m;
    if ((m = withHtml.match(/^\/company\/(.+?)\.html$/))) return `個股 ${decodeURIComponent(m[1])}`;
    if ((m = withHtml.match(/^\/topic\/(.+?)\.html$/)))   return `題材族群「${decodeURIComponent(m[1])}」`;
    if ((m = withHtml.match(/^\/topics\/(.+?)\.html$/)))  return `題材族群「${decodeURIComponent(m[1])}」`;
    if ((m = withHtml.match(/^\/limit-up-(\d{4}-\d{2}-\d{2})\.html$/))) return `漲停分析（${m[1]}）`;
    if (path.startsWith("/admin/"))                       return "後台管理頁";
    return "受保護頁面";
  }
  function roleLabel(role) { return ROLE_LABELS[role] || role; }

  const params = new URLSearchParams(location.search);
  const fromPath = params.get('from') || '';
  const need = params.get('need') || 'premium';

  document.getElementById('from-path').textContent = pathLabel(fromPath);
  document.getElementById('need-role').textContent = roleLabel(need);

  fetch('/api/auth/me')
    .then(r => r.json())
    .then(me => {
      const loginBtn = document.getElementById('login-btn');
      if (me.authenticated) {
        document.getElementById('current-role').textContent = roleLabel(me.role);
        document.getElementById('role-info').style.display = 'block';
        document.getElementById('member-msg').style.display = 'block';
        loginBtn.textContent = '聯絡管理員';
        const subject = `申請升級為${roleLabel(need)}`;
        const body = `Hi，\n\n我是 ${me.email}，想要存取「${pathLabel(fromPath)}」這個頁面。\n請協助升級為${roleLabel(need)}，謝謝！\n\n— 來源頁面：${fromPath}`;
        loginBtn.href = `mailto:gogostock1227@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      } else {
        document.getElementById('guest-msg').style.display = 'block';
        loginBtn.href = `/admin/login.html?next=${encodeURIComponent(fromPath)}`;
      }
    })
    .catch(() => {
      document.getElementById('guest-msg').style.display = 'block';
    });
</script>
</body>
</html>
