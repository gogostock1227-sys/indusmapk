<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需要升級權限 — indusmapk</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --gold: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lock {
    font-size: 3rem;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3));
  }
  h1 {
    margin: 0 0 0.75rem;
    font-size: 1.5rem;
    font-weight: 600;
  }
  p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0.5rem 0;
  }
  .from-path {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.35rem 0.75rem;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
    font-size: 0.85rem;
    color: var(--text);
  }
  .role-info {
    margin: 1.5rem 0;
    padding: 1rem;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .role-info strong { color: var(--gold); }
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .actions a, .actions button {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    border: 0;
    text-align: center;
    transition: opacity 0.15s;
  }
  .actions a:hover, .actions button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border) !important; }
  .role-name {
    text-transform: lowercase;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>此內容需要升級權限</h1>
    <p>你嘗試訪問的頁面：</p>
    <div class="from-path" id="from-path">—</div>

    <div class="role-info" id="role-info" style="display:none">
      <p style="margin-top:0">你目前的角色：<strong class="role-name" id="current-role">—</strong></p>
      <p style="margin-bottom:0">需要的角色：<strong class="role-name" id="need-role">—</strong></p>
    </div>

    <div id="guest-msg" style="display:none">
      <p>請先用 Google 登入，並聯絡管理員協助升級權限。</p>
    </div>

    <div id="member-msg" style="display:none">
      <p>你已經登入。請聯絡管理員協助升級為進階用戶。</p>
    </div>

    <div class="actions">
      <a href="/" class="btn-secondary">回首頁</a>
      <a href="/admin/login.html" id="login-btn" class="btn-primary">用 Google 登入</a>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const fromPath = params.get('from') || '';
  const need = params.get('need') || 'premium';

  document.getElementById('from-path').textContent = fromPath || '（未知頁面）';
  document.getElementById('need-role').textContent = need;

  fetch('/api/auth/me')
    .then(r => r.json())
    .then(me => {
      const loginBtn = document.getElementById('login-btn');
      if (me.authenticated) {
        document.getElementById('current-role').textContent = me.role;
        document.getElementById('role-info').style.display = 'block';
        document.getElementById('member-msg').style.display = 'block';
        loginBtn.textContent = '聯絡管理員';
        loginBtn.href = `mailto:linliusan.claude0823@gmail.com?subject=申請升級為 ${need}&body=希望升級權限存取：${fromPath}`;
      } else {
        document.getElementById('guest-msg').style.display = 'block';
        loginBtn.href = `/admin/login.html?next=${encodeURIComponent(fromPath)}`;
      }
    })
    .catch(() => {
      document.getElementById('guest-msg').style.display = 'block';
    });
</script>
</body>
</html>
