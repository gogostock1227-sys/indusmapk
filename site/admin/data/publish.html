<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發布 — indusmapk admin</title>
<link rel="stylesheet" href="/admin/style.css">
<style>
  .publish-hero {
    text-align: center; padding: 2rem 1rem; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.5rem;
  }
  .publish-hero h2 { margin: 0 0 0.5rem; }
  .publish-hero p { margin: 0 0 1.5rem; color: var(--muted); }
  .publish-btn {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: #fff; border: 0; padding: 1rem 3rem; border-radius: 10px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
  }
  .publish-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
  .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .run-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border); }
  .run-row:last-child { border-bottom: 0; }
  .run-status { font-size: 1.2rem; }
  .run-meta { flex: 1; min-width: 0; }
  .run-time { color: var(--muted); font-size: 11px; font-family: ui-monospace, SF Mono, Menlo, monospace; }
  .conclusion-success { color: #10b981; }
  .conclusion-failure { color: #ef4444; }
  .conclusion-pending { color: #f59e0b; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <h1>🚀 發布</h1>
    <p class="muted" style="margin-top:-0.5rem">點下方按鈕觸發 GitHub Actions 重新 build 並部署到 Cloudflare。整個流程約 3-5 分鐘。</p>

    <div class="publish-hero">
      <h2>立即重新 build & 部署</h2>
      <p>會跑 <code class="mono">site/build_site.py --skip-finlab</code>，把編輯後的資料 render 進靜態頁面。</p>
      <button class="publish-btn" id="publish-btn">🚀 立即發布</button>
      <div style="margin-top:1rem">
        <input type="text" id="reason" placeholder="變更摘要（可選，會記錄在 commit message）"
          style="width:60%; min-width:280px; padding:0.5rem; border:1px solid var(--border); border-radius:6px;
                 background:var(--bg); color:var(--text);">
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h3 style="margin:0">最近 5 次 build</h3>
        <button class="btn-secondary btn-sm" id="reload-btn">重新整理</button>
      </div>
      <div id="runs"><div class="muted" style="padding:1rem">載入中…</div></div>
    </div>
  </main>
</div>

<script src="/admin/app.js"></script>
<script>
(async function () {
  await IM.renderSidebar("data-publish");
  const $ = (s) => document.querySelector(s);

  function statusIcon(status, conclusion) {
    if (status === "completed") {
      if (conclusion === "success") return { icon: "✅", cls: "conclusion-success", text: "成功" };
      if (conclusion === "failure") return { icon: "❌", cls: "conclusion-failure", text: "失敗" };
      return { icon: "⏹", cls: "muted", text: conclusion || "結束" };
    }
    if (status === "in_progress") return { icon: "🔄", cls: "conclusion-pending", text: "進行中" };
    if (status === "queued")      return { icon: "⏳", cls: "conclusion-pending", text: "排隊中" };
    return { icon: "·", cls: "muted", text: status };
  }

  async function loadRuns() {
    try {
      const r = await IM.fetchJson("/api/build/status");
      if (r.runs.length === 0) {
        $("#runs").innerHTML = '<div class="empty">尚無 build 紀錄</div>';
        return;
      }
      $("#runs").innerHTML = r.runs.map(run => {
        const s = statusIcon(run.status, run.conclusion);
        return `<div class="run-row">
          <div class="run-status">${s.icon}</div>
          <div class="run-meta">
            <div><span class="${s.cls}">${s.text}</span> · <a href="${run.url}" target="_blank">在 GitHub 上看</a></div>
            <div class="run-time">建立 ${IM.fmtDate(run.created_at)} · 更新 ${IM.fmtDate(run.updated_at)}</div>
          </div>
          <div class="muted mono" style="font-size:11px">#${run.id}</div>
        </div>`;
      }).join("");
    } catch (e) {
      $("#runs").innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
    }
  }

  $("#publish-btn").addEventListener("click", async () => {
    if (!confirm("確定立即觸發發布？這會建立 GitHub Actions 執行 build_site.py 並重新部署。")) return;
    const reason = $("#reason").value.trim();
    $("#publish-btn").disabled = true;
    try {
      const r = await IM.fetchJson("/api/build/trigger", {
        method: "POST",
        body: JSON.stringify({ reason }),
      });
      IM.flash(r.message, "success");
      $("#reason").value = "";
      // 等 5 秒讓 GitHub 開始 queue 這次 run，再重新載入
      setTimeout(loadRuns, 5000);
    } catch (e) {
      IM.flash(e.message, "error");
    } finally {
      $("#publish-btn").disabled = false;
    }
  });

  $("#reload-btn").addEventListener("click", loadRuns);
  loadRuns();
  setInterval(loadRuns, 30000); // 30 秒自動 refresh
})();
</script>
</body>
</html>
