name: Build and Deploy site

on:
  # Admin 點「發布」按鈕 → POST /api/build/trigger → workflow_dispatch
  workflow_dispatch:
    inputs:
      reason:
        description: '觸發原因（admin 操作摘要）'
        required: false
        default: 'manual rebuild'
  # Source 改動（templates / static / components / build_site.py / data 真理源）→ 自動 build
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'concept_taxonomy/**'
      - 'site/templates/**'
      - 'site/static/**'
      - 'site/components/**'
      - 'site/build_site.py'
      - 'concept_groups.py'

# 同時間只跑一個 build（避免 daily_build.bat 與 admin 手動發布衝突）
concurrency:
  group: build-site
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  acknowledge:
    name: Acknowledge source change (build offloaded to local daily_build.bat)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inspect source change
        id: inspect
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Reason: ${{ github.event.inputs.reason || 'push trigger' }}"
          echo "Commit:  ${{ github.sha }}"
          echo ""
          echo "Recent commit message:"
          git log -1 --pretty=format:"  %h %s%n  %an <%ae>%n  %ad" --date=iso

      - name: Detect source files touched
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null | head -20)
          else
            CHANGED="(workflow_dispatch — admin 從後台 publish.html 觸發)"
          fi
          echo "$CHANGED"
          {
            echo "### Build Acknowledged"
            echo ""
            echo "**注意：此 workflow 目前不跑 build_site.py。**"
            echo ""
            echo "底層原因：site/.cache.parquet (393MB) 超過 GitHub 單檔 100MB 限制無法 commit"
            echo "到 repo，GitHub Actions 環境拿不到 cache → build_site.py --skip-finlab 會 fail。"
            echo ""
            echo "## 此 commit 的去向"
            echo ""
            echo "1. 你（admin）剛剛 commit 的 source 改動已落到 main branch ✓"
            echo "2. 本機 daily_build.bat 三班次（15:30 / 17:00 / 21:30）會自動帶上"
            echo "   並 build_site.py + push dist/ → Cloudflare Pages 重 deploy"
            echo "3. 最多等 5-7 小時即上線"
            echo ""
            echo "## 觸發資訊"
            echo "- **Trigger**: \`${{ github.event_name }}\`"
            echo "- **Reason**: ${{ github.event.inputs.reason || 'push trigger' }}"
            echo "- **Commit**: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "## 之後升級路徑（Phase 5 polish）"
            echo ""
            echo "1. 設 \`FINLAB_TOKEN\` 進 GitHub Secrets"
            echo "2. workflow 加 \`actions/cache@v4\` 保存 site/.cache.parquet"
            echo "3. 第一次 init cache 跑完整 finlab fetch（10+ 分鐘）"
            echo "4. 後續 build cache hit 約 1-2 分鐘"
          } >> $GITHUB_STEP_SUMMARY
