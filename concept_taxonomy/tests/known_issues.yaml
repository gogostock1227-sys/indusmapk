# 已知誤分類回歸測試 fixture
#
# 來源：concept_taxonomy/_FINAL_REPORT.md 段落「關鍵誤分類修正示例」+ HBM.md
# + 使用者於 Plan 中明確點名的反模式案例（嘉澤不可標「高速傳輸」）。
#
# 每筆寫法：
#   - id: 案例編號，唯一
#     group: 族群名（必須與 concept_groups.py / group_specs.json 的 key 一致）
#     ticker: 股票代號
#     name: 公司名（人類辨識用）
#     expected_verdict: core | satellite | remove
#     expected_reason_contains: 列出至少一個必須出現在判決理由的關鍵字
#     expected_position?: 可選，限定 supply_chain_position
#     expected_themes_must_include?: 可選，必須在 core_themes 內
#     expected_themes_must_exclude?: 可選，禁止出現在 core_themes（反模式）

