name = "indusmapk"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "site/dist"

[[d1_databases]]
binding = "DB"
database_name = "indusmapk-admin"
database_id = "54e2631a-09a1-460d-90ba-bdf976a986ff"

[vars]
NODE_ENV = "production"
APP_BASE_URL = "https://indusmapk.com"

# 公開 ID / key（可入 git，CF 會把 [vars] 視為 single source of truth）
GOOGLE_CLIENT_ID = "730652455267-rh5f9cfrqc8nevpbsjq8ce1129e3v7ql.apps.googleusercontent.com"
TURNSTILE_SITE_KEY = "0x4AAAAAADHw9r3wqz3KVByo"
GITHUB_REPO = "gogostock1227-sys/indusmapk"

# Secrets（絕不寫這裡，用 Cloudflare Dashboard → Pages → Settings → Variables 的
# 「Secrets」區塊設定，或用 `wrangler pages secret put NAME --project-name=indusmapk`）：
#   GOOGLE_CLIENT_SECRET   (Google Cloud Console → Credentials 取得)
#   JWT_SECRET             (用 `node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"` 產一組 64-char hex)
#   TURNSTILE_SECRET       (Cloudflare Dashboard → Turnstile widget 設定取得)
#   GITHUB_TOKEN           (GitHub Settings → Personal access tokens → Fine-grained 建立)
#   FINLAB_TOKEN           (Phase 4)
#   ANTHROPIC_API_KEY      (Phase 4)
